<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>任務進度</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>任務進度</h1>
    </header>
    <main>
      <div id="tasksContainer" class="tasks-container"></div>
      <div class="button-group">
        <button type="button" id="backToInput" class="secondary">返回輸入頁</button>
      </div>
    </main>

    <!-- 編輯用的對話框 -->
    <div id="editModal" class="modal hidden" aria-hidden="true">
      <div class="modal-content">
        <h2>修改任務</h2>
        <form id="editForm" class="form">
          <input type="hidden" id="editId" />
          <div class="form-field">
            <label for="editDesc">TASK 項目內容敘述<span class="required">＊</span></label>
            <textarea id="editDesc" rows="3" required></textarea>
          </div>
          <div class="form-field">
            <label for="editMissing">客戶缺少提供內容</label>
            <textarea id="editMissing" rows="2"></textarea>
          </div>
          <div class="form-field">
            <label for="editDueDate">預計客戶提供內容日期<span class="required">＊</span></label>
            <input type="date" id="editDueDate" required />
          </div>
          <div class="form-field">
            <label for="editDevDays">預計開發時程（天）<span class="required">＊</span></label>
            <input type="number" id="editDevDays" min="1" required />
          </div>
          <div class="button-group">
            <button type="submit" class="primary">修改完成</button>
            <button type="button" id="cancelEdit" class="secondary">取消</button>
          </div>
        </form>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
