<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>任務輸入</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>任務輸入</h1>
    </header>
    <main>
      <form id="taskForm" class="form">
        <div class="form-field">
          <label for="taskName">TASK 項目名稱<span class="required">＊</span></label>
          <input
            type="text"
            id="taskName"
            required
            placeholder="請輸入任務名稱"
          />
        </div>
        <div class="form-field">
          <label for="taskDesc">TASK 項目內容敘述<span class="required">＊</span></label>
          <textarea
            id="taskDesc"
            rows="3"
            required
            placeholder="請輸入任務內容敘述"
          ></textarea>
        </div>
        <div class="form-field">
          <label for="missingContent">客戶缺少提供內容</label>
          <textarea
            id="missingContent"
            rows="2"
            placeholder="請輸入客戶尚未提供的內容"
          ></textarea>
        </div>
        <div class="form-field">
          <label for="dueDate">預計客戶提供內容日期<span class="required">＊</span></label>
          <input type="date" id="dueDate" required />
        </div>
        <div class="form-field">
          <label for="devDays">預計開發時程（天）<span class="required">＊</span></label>
          <input
            type="number"
            id="devDays"
            min="1"
            required
            placeholder="請輸入開發天數"
          />
        </div>
        <div class="button-group">
          <button type="submit" id="submitTask" class="primary">輸入完成</button>
          <button type="button" id="viewTasks" class="secondary">目前進度</button>
        </div>
      </form>
      <p id="message" class="message"></p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
